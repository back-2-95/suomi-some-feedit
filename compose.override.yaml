# Development environment override
services:
  php:
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - .:/app
      - /app/var
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      # If you develop on Mac or Windows you can remove the vendor/ directory
      #  from the bind-mount for better performance by enabling the next line:
      #- /app/vendor
    environment:
      FRANKENPHP_WORKER_CONFIG: watch
      SERVER_NAME: :80 # This makes Traefik work
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true
    ports: !reset []
    labels:
      traefik.enable: true
      traefik.http.routers.suomi-some-feedit-dev.entrypoints: https
      traefik.http.routers.suomi-some-feedit-card-dev.rule: Host(`${SERVER_NAME:?SERVER_NAME is missing}`)
      traefik.http.routers.suomi-some-feedit-card-dev.tls: true
      traefik.docker.network: ${TRAEFIK_NETWORK:-traefik-network}
    networks:
      - default
      - traefik-network

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME}
  traefik-network:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-network}
